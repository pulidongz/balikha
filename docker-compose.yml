services:
  postgres:
    image: postgres:16-alpine
    container_name: balikha_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: balikha
      POSTGRES_PASSWORD: balikha_dev
      POSTGRES_DB: balikha
    ports:
      - '5432:5432'
    volumes:
      - balikha_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: balikha_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: balikha_dev
      MINIO_ROOT_PASSWORD: balikha_dev_secret
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - balikha_minio_data:/data
    command: server /data --console-address ":9001"

  # One-shot container that creates the bucket on startup. Idempotent —
  # `mc mb -p ... || true` is a no-op when the bucket already exists, so
  # `docker compose up -d` can be re-run freely. The `mc anonymous set
  # download` line makes objects publicly readable; this is fine for local
  # dev where everything is on localhost. Production reads go through
  # signed URLs or a Cloudflare-fronted public R2 bucket — never replicate
  # this anonymous-access setup beyond dev.
  minio-init:
    image: minio/mc:latest
    container_name: balikha_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 balikha_dev balikha_dev_secret;
      mc mb -p local/balikha-images || true;
      mc anonymous set download local/balikha-images;
      exit 0;
      "

  # Caddy reverse proxy + TLS terminator. Lets you reach the Next dev server
  # at https://balikha.localhost:8443 with a real (locally-trusted) cert.
  # Caddy generates its own root CA on first boot — the host has to trust
  # it once; see README for the one-line command.
  caddy:
    image: caddy:2-alpine
    container_name: balikha_caddy
    restart: unless-stopped
    ports:
      - '8443:8443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - balikha_caddy_data:/data
      - balikha_caddy_config:/config

volumes:
  balikha_pg_data:
  balikha_minio_data:
  balikha_caddy_data:
  balikha_caddy_config:
