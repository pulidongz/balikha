services:
  db:
    image: postgres:16
    container_name: dev-db
    environment:
      POSTGRES_DB: balikha
      POSTGRES_USER: balikha
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balikha -d balikha"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: dev-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: balikha
      MINIO_ROOT_PASSWORD: balikhasecret
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: dev-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 balikha balikhasecret &&
      mc mb --ignore-existing local/balikha &&
      echo 'Bucket balikha ready.'
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    container_name: dev-backend
    command: npx tsx watch src/index.ts
    ports:
      - "8787:8787"
    volumes:
      - ./backend/src:/app/src
      - ./backend/drizzle:/app/drizzle
      - ./backend/drizzle.config.ts:/app/drizzle.config.ts
      - ./backend/entrypoint.sh:/app/entrypoint.sh
      - backend_node_modules:/app/node_modules
    environment:
      PORT: 8787
      DATABASE_URL: postgresql://balikha:secret@db:5432/balikha
      CORS_ORIGINS: http://localhost:3000,http://localhost:8787
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: balikha
      MINIO_SECRET_KEY: balikhasecret
      MINIO_BUCKET: balikha
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: dev-frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - frontend_node_modules:/app/node_modules
    environment:
      API_URL: http://backend:8787
      WATCHPACK_POLLING: "true"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend

volumes:
  pg_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
