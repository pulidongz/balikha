name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run for the same ref when a new commit lands. The
# older run becomes irrelevant the moment a fresher commit exists, and
# canceling it saves Actions minutes + gets faster feedback on the latest
# code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # timeout-minutes on every job: the slowest legitimate run is ~2 minutes,
  # so 10 is generous headroom. Without it, a wedged runner holds the job
  # for GitHub's 360-minute default (observed 2026-06-12: image-sanitize
  # hung ~30 minutes on a bad runner before manual cancellation).
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  format:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

  image-checks:
    name: Image sanitize checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Deterministic guard on the security-critical sanitizeImage helper
      # (EXIF stripping, format allowlist incl. AVIF/heif detection, byte +
      # dimension caps, key extension). Self-contained — generates fixtures
      # with sharp and injects env placeholders, so it needs no DB/MinIO/secrets.
      - name: Image sanitize checks
        run: npm run test:images

      - name: Search bot-filter checks
        run: npm run test:search-bot-filter

      # Regression guard on the JSON-LD serializer that escapes </script> and
      # U+2028/U+2029 (stored-XSS fix). Pure — no DB/secrets.
      - name: JSON-LD escaping checks
        run: npm run test:json-ld

      # Regression guard on the open-redirect defense for ?next= targets. Pure.
      - name: Safe-next open-redirect checks
        run: npm run test:safe-next

      # Regression guard ensuring transitionOrder stays out of a 'use server'
      # module (order-lifecycle auth-bypass fix). Pure — no DB/secrets.
      - name: Transition server-only guard checks
        run: npm run test:transition-guard

      # Guard on the cursor primitive shared by every paginated query. Pure.
      - name: Cursor pagination primitive checks
        run: npm run test:cursor

      # Pure, deterministic guard on the auth-panel daily rotation (rendezvous
      # pick + Manila date key). No DB/secrets — same profile as the checks above.
      - name: Daily-index rotation checks
        run: npm run test:daily-index

      # Regression guard on the pure runAdminAuthCall helper shared by the six
      # admin user-status actions (success passthrough, error message
      # extraction, log fields). No DB/secrets.
      - name: Admin auth-call helper checks
        run: npm run test:admin-auth-call

      # Guard that every AdminActionType enum value has a documented row in
      # the audit coverage list. No DB/secrets.
      - name: Admin audit coverage checks
        run: npm run test:admin-audit-coverage

      # Exhaustive guard on the per-action email-verification posture: every
      # lib/actions server action must be classified GATED or UNGATED, and every
      # GATED action must still call assertVerifiedEmail. A new unclassified
      # action fails this check. No DB/secrets.
      - name: Verified-email gating checks
        run: npm run test:verified-email-gating

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Cache Next.js's incremental build artifacts (Webpack/Turbopack
      # caches, RSC compilation). Keyed on the lockfile + every source
      # file so unrelated PRs share a cache, but the cache is busted as
      # soon as code changes. The restore-keys fallback gets a partial
      # cache hit when only source changes (deps unchanged), which is
      # the common case.
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # env.ts validates required vars at build time and fails fast if
          # any are missing — that's the whole point of the validator. CI
          # never connects to anything; these are placeholders that satisfy
          # the schema. Real prod values land in deployment secrets when
          # CD is added.
          DATABASE_URL: 'postgres://ci:ci@localhost:5432/ci'
          BETTER_AUTH_SECRET: 'this-is-a-ci-only-dummy-secret-32-chars-min'
          BETTER_AUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          S3_ENDPOINT: 'http://localhost:9000'
          S3_REGION: 'auto'
          S3_ACCESS_KEY_ID: 'ci-dummy'
          S3_SECRET_ACCESS_KEY: 'ci-dummy-secret'
          S3_BUCKET: 'ci-dummy-bucket'
          S3_PUBLIC_URL_BASE: 'http://localhost:9000/ci-dummy-bucket'
          EMAIL_FROM: 'ci-dummy@example.com'
          EMAIL_REPLY_TO: 'ci-dummy@example.com'
          # CI build artifact is discarded — these only need to satisfy the
          # env.ts validator. The site key is Cloudflare's always-pass test key.
          TURNSTILE_SECRET_KEY: 'ci-dummy-turnstile-secret'
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'
