name: Release & deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Production build + package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Assert no committed .env would leak into the build
        run: |
          # `npm run build` is the bin/build wrapper around `next build`
          # (package.json:11). bin/build loads the first of
          # .env / .env.local / .env.development into process.env WITHOUT
          # clobbering already-set vars — so the env: block below wins in a
          # fresh CI checkout (none of those files exist). Fail loudly if one
          # ever gets committed, so it can't silently bake the wrong values.
          for f in .env .env.local .env.development; do
            if [ -e "$f" ]; then echo "FATAL: $f present in checkout"; exit 1; fi
          done
      - name: Build (production) # npm run build == node bin/build → next build
        run: npm run build
        env:
          # Only NEXT_PUBLIC_* is inlined into the client bundle — it MUST
          # be the real prod URL. Server vars below are validated by env.ts
          # at build time but never connected to; real values live in
          # /etc/balikha/production.env on the box.
          NEXT_PUBLIC_APP_URL: 'https://balikha.art'
          BETTER_AUTH_URL: 'https://balikha.art'
          DATABASE_URL: 'postgres://ci:ci@localhost:5432/ci'
          BETTER_AUTH_SECRET: 'release-build-dummy-secret-32-chars-minimum'
          S3_ENDPOINT: 'https://example.r2.cloudflarestorage.com'
          S3_REGION: 'auto'
          S3_ACCESS_KEY_ID: 'dummy'
          S3_SECRET_ACCESS_KEY: 'dummy'
          S3_BUCKET: 'balikha-prod'
          S3_PUBLIC_URL_BASE: 'https://images.balikha.art'
          EMAIL_FROM: 'hello@balikha.art'
          EMAIL_REPLY_TO: 'support@balikha.art'
          # Site key is inlined into the shipped client bundle, so it MUST be
          # the real prod widget key — sourced from the repo variable. If the
          # variable is unset it resolves to '' and env.ts fails the build
          # loudly (fail-closed). The secret key is only validated here (never
          # connected to at build); the real one lives in
          # /etc/balikha/production.env and is read at runtime.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: 'release-build-dummy-turnstile-secret'
      - name: Package deploy artifact
        run: |
          # Write the tarball to RUNNER_TEMP — OUTSIDE the tree being archived.
          # Writing it into '.' makes tar see '.' change as the archive grows
          # ("tar: .: file changed as we read it" → exit 1).
          tar --exclude='./.git' --exclude='./node_modules' \
              --exclude='./.env*' --exclude='./.next/cache' \
              -czf "${RUNNER_TEMP}/balikha-deploy-${GITHUB_SHA}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: balikha-deploy-${{ github.sha }}
          path: ${{ runner.temp }}/balikha-deploy-${{ github.sha }}.tar.gz
          retention-days: 14

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    # Only deploy from main — NEVER from a workflow_dispatch on a feature branch
    # (review HIGH). Without this, any write-access user could dispatch the
    # workflow on their own branch and run that branch's deploy.sh as root on
    # prod (DEPLOY_SSH_KEY has NOPASSWD sudo). The build job still runs on any
    # ref; only the root-capable deploy is main-gated.
    if: github.ref == 'refs/heads/main'
    # Gate the root-capable deploy secrets behind a GitHub Environment
    # (Issue 3) so secret access is auditable and can require approval —
    # configure protection rules / required reviewer in GitHub (runbook §2).
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: balikha-deploy-${{ github.sha }}
          path: ./artifact
      - name: Set up SSH for the deploy user
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      - name: Deploy
        run: |
          chmod +x infra/production/deploy.sh
          infra/production/deploy.sh \
            "${{ secrets.DEPLOY_HOST }}" \
            "./artifact/balikha-deploy-${{ github.sha }}.tar.gz"
